name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # GraphSwarm has a history of Windows-only path bugs (\\?\ verbatim paths,
  # separator handling) -run the test suite on Windows too so contributor
  # PRs can't silently break it. Release build + size check stay Linux-only.
  test-windows:
    name: Test Suite (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        run: cargo test

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Cheapest checks first so a trivial failure doesn't cost a full
      # release build's worth of CI time.
      - name: Format check
        run: cargo fmt --check

      - name: Clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Build (release)
        run: cargo build --release

      - name: Check binary size
        run: |
          SIZE=$(stat -c%s target/release/graphswarm 2>/dev/null || \
                 stat -f%z target/release/graphswarm)
          echo "Binary size: $SIZE bytes ($(( SIZE / 1024 / 1024 )) MB)"
          if [ "$SIZE" -gt 20971520 ]; then
            echo "ERROR: binary exceeds 20 MB target ($SIZE bytes)"
            exit 1
          fi
          echo "✓ Binary size within 20 MB target"
